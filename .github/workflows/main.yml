name: Build WaveForge macOS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  PLUGIN_NAME: WaveForge

jobs:
  build-macos:
    name: VST3 AU PKG
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode_15.2.app/Contents/Developer

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps/juce-src
          key: juce-8.0.12-${{ runner.os }}

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel $(sysctl -n hw.logicalcpu)

      - name: Stage plugins
        run: |
          mkdir -p "pkgroot/Library/Audio/Plug-Ins/VST3"
          mkdir -p "pkgroot/Library/Audio/Plug-Ins/Components"
          VST3=$(find build -name "*.vst3" -type d | head -1)
          AU=$(find build -name "*.component" -type d | head -1)
          test -n "$VST3"
          test -n "$AU"
          cp -R "$VST3" "pkgroot/Library/Audio/Plug-Ins/VST3/"
          cp -R "$AU" "pkgroot/Library/Audio/Plug-Ins/Components/"
          mkdir -p dist
          cp -R "$VST3" dist/
          cp -R "$AU" dist/

      - name: Build pkg installer
        run: |
          pkgbuild \
            --root pkgroot \
            --identifier com.waveforgeaudio.waveforge \
            --version 1.0.0 \
            --install-location / \
            "dist/${PLUGIN_NAME}-macOS-universal.pkg"

      - name: Upload plugins and installer
        uses: actions/upload-artifact@v4
        with:
          name: WaveForge-macOS-universal
          path: |
            dist/*.vst3
            dist/*.component
            dist/*.pkg
          if-no-files-found: error
